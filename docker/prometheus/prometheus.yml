global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mogao-caves'
    replica: 'prometheus-01'

scrape_configs:
  - job_name: 'service_alert_ws'
    static_configs:
      - targets: ['service_alert_ws:8005']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'service_5g_ingest'
    static_configs:
      - targets: ['service_5g_ingest:8001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'service_grout'
    static_configs:
      - targets: ['service_grout:8004']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
