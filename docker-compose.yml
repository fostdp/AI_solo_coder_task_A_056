version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg15
    container_name: mine-timescaledb
    environment:
      POSTGRES_DB: ${DB_NAME:-smart_mine_monitoring}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mine-network
    restart: unless-stopped

  mine-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mine-server
    environment:
      NODE_ENV: production
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smart_mine_monitoring}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      PORT: 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - mine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sensor-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: mine-sensor-simulator
    environment:
      NODE_ENV: production
      SERVER_HOST: mine-server
      SERVER_PORT: 3000
      WS_URL: ws://mine-server:3000
      SIMULATION_INTERVAL: 10000
      ANOMALY_RATE: 0.05
    depends_on:
      mine-server:
        condition: service_healthy
    networks:
      - mine-network
    restart: unless-stopped

  personnel-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: mine-personnel-simulator
    environment:
      NODE_ENV: production
      SERVER_HOST: mine-server
      SERVER_PORT: 3000
      WS_URL: ws://mine-server:3000
      UPDATE_INTERVAL: 2000
    entrypoint: ["node", "simulators/personnel-simulator.js"]
    depends_on:
      mine-server:
        condition: service_healthy
    networks:
      - mine-network
    restart: unless-stopped

volumes:
  timescaledb_data:
    driver: local

networks:
  mine-network:
    driver: bridge
