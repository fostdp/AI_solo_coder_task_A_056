services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: mogao-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mogao_monitor
      TS_TUNE_MAX_CONNS: 200
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mogao_monitor"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mogao-net

  redis:
    image: redis:7-alpine
    container_name: mogao-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - mogao-net

  service_5g_ingest:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-5g-ingest
    working_dir: /app
    command: ["python", "services/5g_ingest/main.py"]
    environment:
      MOGAO_DATABASE_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/mogao_monitor
      MOGAO_SYNC_DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/mogao_monitor
      MOGAO_REDIS_URL: redis://redis:6379/0
      MOGAO_DEBUG: "false"
    ports:
      - "8001:8001"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mogao-net

  service_wavelet:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-wavelet
    working_dir: /app
    command: ["python", "services/wavelet_denoise/main.py"]
    environment:
      MOGAO_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mogao-net

  service_ssi:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-ssi
    working_dir: /app
    command: ["python", "services/ssi_modal/main.py"]
    environment:
      MOGAO_DATABASE_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/mogao_monitor
      MOGAO_REDIS_URL: redis://redis:6379/0
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mogao-net

  service_grout:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-grout
    working_dir: /app
    command: ["python", "services/grout_diffusion/main.py"]
    environment:
      MOGAO_DATABASE_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/mogao_monitor
      MOGAO_REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mogao-net

  service_alert_ws:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-alert-ws
    working_dir: /app
    command: ["python", "services/alert_ws/main.py"]
    environment:
      MOGAO_DATABASE_URL: postgresql+asyncpg://postgres:postgres@timescaledb:5432/mogao_monitor
      MOGAO_REDIS_URL: redis://redis:6379/0
    ports:
      - "8005:8005"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mogao-net

  simulator:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.python
    container_name: mogao-simulator
    working_dir: /app
    command: ["python", "simulator/fiveg_simulator.py", "--mode", "standard", "--interval-seconds", "3600", "--devices", "80"]
    environment:
      MOGAO_INGEST_URL: http://service_5g_ingest:8001
    depends_on:
      - service_5g_ingest
    restart: unless-stopped
    profiles:
      - simulator
    networks:
      - mogao-net

  frontend:
    image: nginx:1.27-alpine
    container_name: mogao-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - service_alert_ws
    restart: unless-stopped
    networks:
      - mogao-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mogao-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - mogao-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: mogao-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: mogao123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    restart: unless-stopped
    networks:
      - mogao-net

volumes:
  timescale_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  mogao-net:
    driver: bridge
