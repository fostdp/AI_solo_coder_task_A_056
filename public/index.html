<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧矿山安全监测平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <h1>智慧矿山安全监测平台</h1>
                <span class="mine-name">XX地下矿山</span>
            </div>
            <div class="header-right">
                <div class="status-item">
                    <span class="status-label">在线传感器</span>
                    <span class="status-value" id="sensorCount">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">井下人员</span>
                    <span class="status-value" id="personnelCount">0</span>
                </div>
                <div class="status-item alert-status">
                    <span class="status-label">活动告警</span>
                    <span class="status-value" id="alertCount">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">系统时间</span>
                    <span class="status-value" id="systemTime">--:--:--</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar left-sidebar">
                <div class="sidebar-section">
                    <h3>传感器类型</h3>
                    <div class="sensor-type-list">
                        <div class="sensor-type-item">
                            <span class="sensor-icon gas"></span>
                            <span>瓦斯浓度</span>
                            <span class="threshold">阈值: 1.0%</span>
                        </div>
                        <div class="sensor-type-item">
                            <span class="sensor-icon dust"></span>
                            <span>粉尘浓度</span>
                            <span class="threshold">阈值: 10mg/m³</span>
                        </div>
                        <div class="sensor-type-item">
                            <span class="sensor-icon roof"></span>
                            <span>顶板位移</span>
                            <span class="threshold">阈值: 10mm</span>
                        </div>
                        <div class="sensor-type-item">
                            <span class="sensor-icon wind"></span>
                            <span>风速</span>
                            <span class="threshold">阈值: 0.25m/s</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>图例说明</h3>
                    <div class="legend-list">
                        <div class="legend-item">
                            <span class="legend-color normal"></span>
                            <span>正常</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color warning"></span>
                            <span>预警</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color danger"></span>
                            <span>告警</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon personnel"></span>
                            <span>人员定位</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color power-off"></span>
                            <span>电源切断</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>区域列表</h3>
                    <div class="zone-list" id="zoneList"></div>
                </div>
            </aside>

            <main class="canvas-container">
                <canvas id="mineCanvas" width="1200" height="800"></canvas>
                <div class="canvas-controls">
                    <button id="zoomIn">放大 +</button>
                    <button id="zoomOut">缩小 -</button>
                    <button id="resetView">重置视图</button>
                </div>
            </main>

            <aside class="sidebar right-sidebar">
                <div class="sidebar-section">
                    <h3>实时告警</h3>
                    <div class="alert-list" id="alertList">
                        <div class="no-alerts">暂无告警信息</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>人员列表</h3>
                    <div class="personnel-list" id="personnelList"></div>
                </div>
            </aside>
        </div>

        <div class="modal-overlay" id="modalOverlay" style="display: none;">
            <div class="modal" id="sensorModal">
                <div class="modal-header">
                    <h3 id="modalTitle">传感器详情</h3>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="sensor-info">
                        <div class="info-row">
                            <span class="label">传感器ID:</span>
                            <span id="modalSensorId">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">传感器名称:</span>
                            <span id="modalSensorName">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">类型:</span>
                            <span id="modalSensorType">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">当前值:</span>
                            <span id="modalSensorValue" class="value">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">所属区域:</span>
                            <span id="modalSensorZone">-</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h4>近1小时数据趋势</h4>
                        <canvas id="trendChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="alert-flash" id="alertFlash" style="display: none;"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/tunnel-renderer.js"></script>
    <script src="js/sensor-manager.js"></script>
    <script src="js/alert-manager.js"></script>
    <script src="js/personnel-tracker.js"></script>
    <script src="js/power-cutoff-controller.js"></script>
    <script src="js/trend-chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
